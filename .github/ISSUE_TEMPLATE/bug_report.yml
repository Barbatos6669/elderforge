name: Bug Report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: godot-version
    attributes:
      label: Godot Version
      placeholder: "4.x"
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add logs, screenshots, or extra context.
